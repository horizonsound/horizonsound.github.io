---
layout: default
title: Horizon Sound
---

<!-- ============================================================
     DATA: Liquid outputs only the playlist songs array
============================================================ -->
<script>
  window.allSongs = {{ playlist_songs | jsonify }};
</script>

<!-- ============================================================
     VIEWER
============================================================ -->
<div id="viewer"></div>

<!-- ============================================================
     ABOUT + LYRICS
============================================================ -->
<div id="playlist-about"></div>
<div id="playlist-lyrics"></div>

<!-- ============================================================
     CAROUSEL
============================================================ -->
<div id="carousel"></div>

<!-- ============================================================
     JS: VIEWER (YouTube iframe)
============================================================ -->
<script>
function loadViewer(song) {
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = `
    <iframe
      width="100%"
      height="315"
      src="https://www.youtube.com/embed/${song.youtube_id}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>
  `;
}
</script>

<!-- ============================================================
     JS: DESCRIPTION + LYRICS
============================================================ -->
<script>
function loadText(song) {
  document.getElementById('playlist-about').innerHTML = song.description_html || "";
  document.getElementById('playlist-lyrics').innerHTML = song.lyrics_html || "";
}
</script>

<!-- ============================================================
     JS: CAROUSEL (with Coming Soon overlay)
============================================================ -->
<script>
function buildCarousel(songs) {
  const container = document.getElementById('carousel');
  container.innerHTML = "";

  songs.forEach(song => {
    const tile = document.createElement('div');
    tile.className = "carousel-tile";
    tile.dataset.songId = song.song_id;

    const isComingSoon = song.videostatus !== "public";

    tile.innerHTML = `
      <div class="carousel-thumb-wrapper">
        <img class="carousel-thumb" src="${song.thumbnail}" alt="${song.title}">
        ${isComingSoon ? `<div class="coming-soon-overlay">Coming Soon</div>` : ""}
      </div>
      <div class="tile-title">${song.title}</div>
    `;

    if (!isComingSoon) {
      tile.addEventListener('click', () => {
        loadViewer(song);
        loadText(song);
      });
    }

    container.appendChild(tile);
  });
}
</script>

<!-- ============================================================
     JS: INITIALIZE PAGE
============================================================ -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const songs = window.allSongs;
  if (!songs || songs.length === 0) return;

  const first = songs[0];

  loadViewer(first);
  loadText(first);
  buildCarousel(songs);
});
</script>

<!-- ============================================================
     CSS: MINIMAL CAROUSEL + OVERLAY
============================================================ -->
<style>
.carousel-tile {
  width: 160px;
  cursor: pointer;
  display: inline-block;
  margin-right: 12px;
}

.carousel-thumb-wrapper {
  position: relative;
}

.carousel-thumb {
  width: 100%;
  border-radius: 6px;
}

.coming-soon-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tile-title {
  margin-top: 6px;
  font-size: 14px;
  color: #fff;
}
</style>

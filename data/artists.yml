    Amee Keller brings a refreshing burst of sunshine to Horizon Sound with her
    bright, youthful acoustic-pop style. Her voice is clean, warm, and expressive,
    carrying a natural sense of optimism that makes every song feel like a memory
    you’re happy to relive. Amee’s storytelling leans into nostalgia—road trips,
    friendships, small-town charm, and the simple joys that shape who we are.


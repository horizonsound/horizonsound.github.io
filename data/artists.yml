    William Thomas is a warm‑voiced country crooner with a classic 1950s
    western sound, blending heartfelt storytelling with nostalgic charm.
  bio_long: |
    William Thomas brings the golden age of country‑western into the modern
    Horizon Sound universe with a voice that feels lifted from a dusty jukebox.
    His smooth baritone, gentle vibrato, and campfire‑ready storytelling evoke

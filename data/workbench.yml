  lyrics_raw: |-
    Verse
    The wind is howling at the window,
    Rain pounding, trying to break through.
    You pull me closer on the pillow,
    Whisper, "Baby... all I need is you."

    Pre Chorus
    We don't need a plan tonight,
    Just your gentle touch.
    Bodies tangled, holding tight,
    Lost inside this heavenly rush.

    Chorus
    So let's snuggle,
    Wrapped up in this little bubble.
    Outside's cold and wild,
    But in here it's just us.
    Yeah, let the thunder rumble -
    We're not moving a muscle.
    It's raining, it's cold,
    But being with you is pure gold.
    So let's snuggle...
    (Just snuggle)

    Verse
    Blankets piled up on the bed,
    Your clothes scattered on the floor.
    You pull the covers over our heads -
    And your touch hits me right to my core.

    Pre Chorus
    We don't need the world tonight,
    Just your hands and soft daylight.
    Let the storm outside have its say -
    Cause in this moment, the world is right.

    Chorus
    So let's snuggle,
    Wrapped up in this little bubble.
    Outside's cold and wild,
    But in here it's just us.
    Yeah, let the thunder rumble -
    We're not moving a muscle.
    It's raining, it's cold,
    But being with you is pure gold.
    So let's snuggle...
    (Just snuggle)

    Bridge
    Let the rain fall, let the wind roar,
    We've got everything we need and more.
    Hold me close, don't let go -
    Baby, you are my home.

    Chorus
    So let's snuggle,
    Wrapped up in this little bubble.
    Outside's cold and wild,
    But in here it's just us.
    Yeah, let the thunder rumble -
    We're not moving a muscle.
    It's raining, it's cold,
    But being with you is pure gold.
    So let's snuggle...
    (Just snuggle)
    Snuggle...

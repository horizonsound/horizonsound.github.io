    Half of my heart is still breaking in two
    I keep pretending I'm fine, but the truth
    Is I can't learn to live without you
    Healing is slow - I'll take it day by day
    But half of my heart still begs you to stay

    Verse
    I keep the lights on in the hallway
    It helps keep my ghosts at bay 
    They whisper in the darkness 
    About the truth I couldn't face

    Pre Chorus
    I tried to walk away, but every step
    Pulls me slowly back to the start
    I didn't see the cost until it hit -
    Loving you meant losing half my heart

    Chorus
    Half of my heart still reaches for you
    Half of my heart is still breaking in two
    I keep pretending I'm fine, but the truth
    Is I can't learn to live without you
    Healing is slow - I'll take it day by day
    But half of my heart still clings to yesterday

    Bridge
    I know I'll never forgive the way
    We fell apart without even trying 
    I promise myself that one day
    I'll be happy even though-

    Chorus
    Half of my heart still reaches for you
    Half of my heart is still breaking in two
    I keep pretending I'm fine, but the truth
    Is I can't learn to live without you
    Healing is slow - I'll take it day by day
    But half of my heart is fading away

    Outro
    Half of my heart...
    still calls your name.

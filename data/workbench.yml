  lyrics_raw: |-
    Verse
    In a crowded delivery room
    A nurse says to the new mother
    "Congratulations - It's a boy."
    But if they had been listening
    They would have heard her little voice saying
    "Mama, It's me. It's your daughter
    The one you always wanted."
    It's been a journey to here
    But I'm here now, lying in your arms. 
    A new beginning

    Pre Chorus
    Days go by,  seasons come and go
    Her mind and body continue to grow 

    Chorus
    But it all began with that quiet little voice,
    that always knew who she was
    And it was the courage to listen 
    that got her here today

    Verse
    The hormones she started to take
    slowly began to soften her features
    She began to really see herself,
    Her reflection began to match her soul
    That quiet little voice was replaced 
    With the confidence to speak up and be heard
    The confidence to finally say yes to the boy 
    She had been seeing, to love him fully
    And to let herself be loved.
    The quiet little voice turned into their loud 
    declaration of love

    Pre Chorus
    Days go by,  seasons come and go
    Her mind and body continue to grow 

    Chorus
    But it all began with that quiet little voice,
    that always knew who she was
    And it was the courage to listen 
    that got her here today

    Bridge
    One day he offered her a ring
    And she cried as she said "Yes"
    Soon they were making wedding plans
    And dreaming of a family of their own 

    Pre Chorus
    Days go by,  seasons come and go
    Her mind and body continue to grow 

    Chorus
    But it all began with that quiet little voice,
    that always knew who she was
    And it was the courage to listen 
    that got her here today

    Post Chorus
    In a crowded delivery room
    A nurse will say to her
    "Congratulations - It's a girl."
    But she'll already know
    Because she learned a long time ago 
    to always listen to that quiet little voice

    Outro
    It was that voice that knew the whole time
    And it was that voice that got her here today
    A new beginning...

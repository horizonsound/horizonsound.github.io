  lyrics_raw: |-
    Verse
    I kept your letters in a shoebox
    Tucked between my hopes and dreams 
    Every promise that we whispered
    Still pulls at every fragile seam 

    Pre Chorus
    I tried to walk away, but every step
    Pulls me slowly back to the start
    I didn't see the cost until it hit -
    Loving you meant losing half my heart

    Chorus

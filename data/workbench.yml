- id: wb_222
  status: seed
  lyrics_raw: ''
  metadata: {}
  idea: |-
    “Wings of Fire” is SUCH a Ravyn title. It practically writes itself.
    Angel‑core aesthetic, neon‑chaos energy, a little danger, a little desire — this is her lane.
    Here’s a tight, clean song seed built around:
    Ravyn as an angel with a devilish streak
    Fire, flight, temptation
    Her signature “beautiful chaos” vibe
    And I’ll give you multiple directions so you can choose the flavor you want.
    ⭐ Core Song Seed — Wings of Fire
    Concept:  
    She looks like an angel — soft glow, halo‑light, feathered wings — but everything about her burns hotter than heaven can handle. She’s temptation wrapped in innocence, a wildfire with feathers. She doesn’t fall from grace; she jumps.
    Themes:
    duality (angelic vs. dangerous)
    desire as a flame
    choosing chaos over purity
    empowerment through rebellion
    beauty that burns
    Tone:  
    High‑impact pop with cinematic edges.
    Bright, electric, dangerous.
    Ravyn at her most iconic.
    ⭐ Hook Concepts (pick your favorite)
    “She’s got wings of fire — heaven never stood a chance.”
    “An angel made of gasoline, lighting up the sky.”
    “Touch her halo and you’ll burn.”
    “She flies like grace, but she lands like a spark.”
    Each one can anchor a chorus depending on the direction you choose.
    ⭐ Three Distinct Song Directions
    Each one is a full seed you can build from.
    🔥 1. Angel‑Gone‑Rogue Pop Anthem
    Vibe: High‑impact pop, neon, confident, Ravyn in full swagger mode.
    Concept: She was born to be good — but being good was boring.
    Seed:  
    She’s the angel who didn’t fall — she escaped.
    She traded her white wings for ones made of flame.
    She’s done apologizing for being too much, too bright, too wild.
    Now she’s burning her own path across the sky.
    Best for: Ravyn’s high‑impact pop style.
    Explore: High‑impact Ravyn direction
    😈 2. Seductive Dark‑Cinematic Temptation
    Vibe: Slow‑burn, smoldering, dangerous, cinematic.
    Concept: She’s the angel you pray to and the sin you fall for.
    Seed:  
    She looks holy in the moonlight, but her shadow tells the truth.
    Her wings glow like embers — beautiful, deadly.
    She whispers salvation but tastes like sin.
    You know she’ll ruin you, and you still step closer.
    Best for: Ravyn’s dark cinematic style.
    Explore: Dark‑cinematic Ravyn direction
    😇🔥 3. Brat‑Pop “Heaven Can’t Handle Me” Energy
    Vibe: Playful, chaotic, sassy, bratty.
    Concept: She’s an angel with attitude — and heaven kicked her out for being too fun.
    Seed:  
    She’s got a halo, but it’s tilted.
    She flirts with danger and laughs at rules.
    Her wings spark when she moves — she’s basically a walking fire hazard.
    Heaven said “behave,” and she said “make me.”
    Best for: Ravyn’s brat‑pop style.
    Explore: Brat‑pop Ravyn direction

    ⭐ Ravyn — Brat‑Pop Angel With a Devilish Streak
    Lane: playful, chaotic, neon‑bright, dangerous‑cute
    Core idea: She’s heaven’s problem child — halo tilted, wings sparking, too fun to be holy.
    Seed:  
    She’s got a halo but it’s cracked, wings that flare when she laughs, and a habit of setting hearts on fire just by walking into the room. Heaven told her to behave; she told them to keep up.
    Explore: Brat‑pop Ravyn direction

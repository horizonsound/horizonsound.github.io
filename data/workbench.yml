  idea: '🎸 Craig Mitchell — “Small Town Love Affair” Concept:   A nostalgic, cinematic, slightly rebellious love story set in a town too small to hold two hearts this big. It’s not teenage puppy love — it’s the kind of connection that feels inevitable, like the whole town knew before they did. Tone:   Warm, 80s‑infused pop‑rock with a modern sheen. Think neon reflections on wet pavement, denim jackets, headlights on a back road. Core Idea:   Two people who were never supposed to end up together… but everyone in town could see it coming a mile away. 🌾 Seed Breakdown Opening Visual He’s driving past the old diner, windows down, radio humming. She’s locking up after a late shift, hair pulled back, tired but glowing. They catch eyes — again — and it feels like the whole town exhales. Emotional Hook It’s not scandalous. It’s not forbidden. It’s just… undeniable. A love that grows in the cracks between routine and responsibility. The Twist Everyone in town has a theory about them. Everyone’s been waiting for this. Even the old men at the barbershop are placing bets. Craig’s POV He’s not trying to be poetic — he’s just telling the truth the way he always does: straightforward, earnest, a little rough around the edges, but full of heart.'

  title: Telluride
  idea: Folk/Bluegrass ballad
  tags:
    - lydia
    - folk
    - bluegrass
    - acoustic
  artist: Amee Keller
  project: ''
  lyrics_raw: |-
    Verse
    I came down through the valley floor, the mountains rising high,
    Snowlight on the San Juans, like a halo in the sky.
    Bridal Veil was whisperin', falling soft against the stone,
    And I swear that canyon held me like it knew I was alone.

    Verse
    Main Street in the morning, coffee warming up my hands,
    Old-west doors and quiet stores, the kind that time forgets.
    I rode the gondola upward, watched the whole town fade below,
    Felt the weight I carried with me melt away like winter snow.

    Chorus
    Telluride... you took a heart that couldn't breathe,
    Wrapped me in your quiet, let the hurt fall off of me.
    In your stillness, in your sunlight, in your cold and endless sky,
    I found the girl I lost a long, long time ago...
    Telluride.

    Verse
    Bear Creek in the evening, golden light along the trail,
    Every step a little softer, every breath a little brave.
    I left pieces of my sorrow where the river bends and winds,
    And the echo in that canyon said the past ain't mine to find.

    Chorus
    Telluride... you took a heart that couldn't breathe,
    Wrapped me in your quiet, let the hurt fall off of me.
    In your stillness, in your sunlight, in your cold and endless sky,
    I found the girl I lost a long, long time ago...
    Telluride.

    Bridge
    Maybe healing's just a moment when the world stands still enough,
    For the mountains to remind you you've always been strong enough.
    And maybe all the broken pieces fall in place with time-
    I just needed somewhere gentle... somewhere high.

    Chorus
    Telluride... you took a heart that couldn't breathe,
    Held me in your silence till I finally felt me.
    In your stillness, in your sunlight, in your cold and endless sky,
    I found the girl I lost a long, long time ago...
    Telluride...
    Telluride.

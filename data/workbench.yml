  title: 16. Right Here (Wedding Vows Cut)
  idea: null
  tags: []
  artist: Ellie Hale
  project: Emergence
  lyrics_raw: |-
    Verse
    We grew up together on Mason street,
    Playing all summer on my front-yard swing.
    When you walked with me to school
    It was always the best part of my day.
    I've seen you from the very start,
    Quiet laugh, big heart, and a beautiful mind -
    And I've been right here all this time,
    Waiting for the day when you notice me too.

    Pre Chorus
    I watch you fall for the wrong girls
    They can't see in you what I see.
    I don't know how to make you realize
    You deserve someone more like me

    Chorus
    'Cause I've always been right here,
    Watching you from across the street.
    I see you clearer than they ever can.
    Knowing in my heart we're meant to be
    And I'm right here,
    Wishing you'd look at me the way you look at them.
    If you'd just wake up - you'd see...
    I've always been the one for you..

    Verse
    I know the way you bite your nails
    When you're nervous, trying not to show it.
    I know the jokes you only tell
    When you're with someone you really trust.
    And when I see you in the hall
    I hate the way your shoulders sag.
    You keep giving pieces of your heart
    And getting little in return.

    Pre Chorus
    And I'm still here waiting,
    Hoping someday you'll finally see.
    I don't want to change you -
    Just love you, unconditionally.

    Chorus
    'Cause I've always been right here,
    Watching you from across the street.
    I see you clearer than they ever can.
    Knowing in my heart we're meant to be
    And I'm right here,
    Wishing you'd look at me the way you look at them.
    If you'd just wake up - you'd see...
    I've always been the one for you..

    Bridge
    I don't expect you to choose me
    I don't want to break you up.
    If she's the one you need - I'm happy-
    Well - I guess that's a lie...
    I just wish you'd see me, the way I see you -
    The boy who's always been in my heart.

    Chorus
    'Cause I've always been right here,
    Watching you from across the street.
    I see you clearer than they ever can.
    Knowing in my heart we're meant to be
    And I'm right here,
    Wishing you'd look at me the way you look at them.
    If you'd just wake up - you'd see...
    I've always been the one for you..

    Outro
    And as we walk home from school,
    You reach for my hand without thinking -
    And for the first time in forever,
    It feels like maybe...
    you finally see me.

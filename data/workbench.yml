  lyrics_raw: |-
    Verse
    Didn't take much to see the truth.
    Didn't take long to find your ring.
    Asked you once - you laughed it off,
    said I was nothing but a fling.

    I looked at you and smiled that knowing grin,
    'cause you don't know what I know.

    Pre Chorus
    I said it's fine.
    You don't owe me anything.
    Go on -
    I'll take care of everything.

    Chorus
    If someone breaks tonight,
    it won't be me.
    If someone falls apart,
    it won't be me.
    You lit the fuse,
    but I'm walking away.
    If someone breaks tonight,
    it won't be me.

    Verse
    You didn't know I knew her.
    Your wife won't expect me.
    I drove over just to see
    the life you swore you didn't have.

    She opened the door...
    I walked right in.

    I'm not here to take a thing -
    in fact, you can have him back.
    Thought you deserved the truth.
    He's been cheating on you.

    Pre Chorus
    Door opens - and you walk in.
    You freeze when you see me.
    I smile and wave - told you
    I'd take care of everything.

    Chorus
    If someone breaks tonight,
    it won't be me.
    If someone falls apart,
    it won't be me.
    You lit the fuse,
    but I'm walking away.
    If someone breaks tonight,
    it won't be me.

    Bridge
    I am not a victim.
    I am not weak.
    I will not be used -
    and I pity anyone who tries.

    Chorus
    If someone breaks tonight,
    it won't be me.
    If someone falls apart,
    it won't be me.
    You lit the fuse,
    but I'm walking away.
    If someone breaks tonight,
    it won't be me.

    Outro
    Door closed.
    Voices rising.
    Not my fire to fight.
    I walk away -
    no reason to look back.

  lyrics_raw: |-
    Verse
    I said I'm done with crushes,
    Swore I'm keeping my heart clean.
    But then you smiled at me
    And now I'm losing my chill.
    My friends are watching closely,
    They know the signs before I do.
    I'm trying hard to play it cool
    But I'm already standing here-
    All deer in the headlights...

    Pre Chorus
    I keep saying "it's nothing,"
    But they're giving me that grin.
    'Cause every time you text me
    I forget where I am.

    Chorus
    Oops... I caught feelings again,
    Told all my friends I wouldn't, but here I am.
    I swear I'm fine - don't look at me like that,
    'Cause one little smile and I'm right back where I swore I'd never be.
    Oops... I caught feelings again.

    Verse
    They're blowing up the group chat,
    Snaps flying everywhere.
    ("Girl, you're glowing - don't deny it,")
    And I pretend I don't care.
    But I'm pacing in my bedroom,
    Overthinking everything.
    Trying not to fall too fast
    But I'm already over my head.

    Pre Chorus
    I keep saying "it's nothing,"
    But I'm smiling like a fool.
    And every time you call me
    I lose my cool.

    Chorus
    Oops... I caught feelings again...
    Told all my friends I wouldn't, but here I am.
    I swear I'm fine - don't look at me like that,
    'Cause one little smile and I'm right back where I swore I'd never be.
    Oops... I caught feelings again.

    Bridge
    Okay, fine - I like you,
    There, I said it out loud.
    Didn't mean to fall this fast,
    But look at me now.
    My heart's a repeat offender,
    Never learns from the messes I've made.
    But maybe this time
    Falling could be fun.

    Chorus
    Oops... I caught feelings again...
    Told all my friends I wouldn't, but here I am.
    I swear I'm fine - don't look at me like that,
    'Cause one little smile and I'm right back where I swore I'd never be.
    Oops... I caught feelings again.

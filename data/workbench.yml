    I pay it forward, forward,send a little good and it comes back stronger.
    I'm shining brighter, brighter,lifting up the world like it's getting lighter.
    I don't need the drama or the small-time chatter-
    I'm rising, smiling,giving what I wish I had.
    Yeah, I pay it forward, forward-and it all comes back.


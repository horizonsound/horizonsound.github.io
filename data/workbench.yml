  idea: '⭐ Song Seed: “Not Forgotten” Artist: Craig Mitchell or Lucas Allen Concept: A tribute to veterans who’ve passed — their stories, sacrifices, and spirit live on. They are gone, but never lost. 🎵 Core Theme The people we lose in uniform don’t disappear — they echo in the lives they touched, the freedoms they defended, and the memories carried forward. The song is a promise: “We remember you. You’re still here.” 🔥 Hook Concept A strong, steady refrain — not sad, but resolute. “You’re gone, but you’re never lost… We carry your name like a flame that won’t stop.” Craig would deliver this with grit and gravel. Lucas would deliver it with warmth and emotional clarity. 🎙️ Verse Concepts Verse 1 — The Empty Chair / The Full Legacy A folded flag on a mantle Boots by the door that won’t be worn again But stories still told around the table Their laugh still heard in the back of your mind Verse 2 — The Things They Left Behind A dog tag hanging from a rearview mirror A letter tucked in a Bible A photo that still feels alive The way they taught you to stand tall 🌄 Pre‑Chorus Concept A rising moment of reflection: “They gave more than most will ever know.” “They taught us how to live with courage.” “They showed us what honor looks like.” 🌟 Bridge Concept A quiet vow: “As long as we breathe, your story breathes too.” This is where Craig would go intimate and raw. Lucas would go reflective and heartfelt. 🎧 Vibe & Production Direction Craig Mitchell version Cinematic Americana Low toms, acoustic guitar, military snare Big, rising chorus Stadium‑ready but deeply personal Lucas Allen version Warm pop‑folk Clean electric guitar, soft pads Emotional but uplifting More “letter to a friend” than “national anthem” 🪖 Emotional Angle This isn’t a song about death. It’s a song about continuance. They lived. They mattered. They shaped the world. And they’re still here — in us.'

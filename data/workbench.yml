  title: Time‑Travel Project
  idea: Quantum‑Leap‑style concept album; each track is a jump to a new era
  tags:
    - concept-album
    - time-travel
    - multi-genre
  artist: null
  project: Time‑Travel Album
  lyrics_raw: ''
  lyricNotes: |
    Core Concept:
      A traveler is thrown through time, each jump landing them in a different era.
      Each song = a new era + a new emotional beat in the story.
      Music style changes to match the era.
      Emotional arc rises from confusion → discovery → temptation → empowerment → resolution.

    Structure:
      7‑Jump Arc (Perfect Album Length)

      1. 1927 – Prohibition Jazz / Speakeasy Swing
        Vibe: smoky horns, upright bass, brushed drums.
        Story beat: The traveler wakes up confused in a speakeasy, realizing time is broken.

      2. 1944 – WWII Big Band / Andrews Sisters Harmony
        Vibe: brass, marching‑snare, vintage radio tone.
        Story beat: They meet people living through war; themes of hope and uncertainty.

      3. 1956 – Rockabilly / Early Elvis / Sun Records
        Vibe: slapback echo, twangy guitar, upright bass.
        Story beat: They start embracing the chaos of the jumps.

      4. 1967 – Psychedelic Rock / Summer of Love
        Vibe: sitar, reverb‑washed vocals, dreamy harmonies.
        Story beat: They question whether they even want to go home.

      5. 1978 – Disco / Funk / Studio 54
        Vibe: strings, four‑on‑the‑floor, glittery synths.
        Story beat: They feel alive, powerful — but the jump rips them away again.

      6. 1985 – Arena Rock / Heart / Vixen / Bon Jovi
        Vibe: big drums, power chords, soaring chorus.
        Story beat: They fight back against fate — emotional peak.

      7. 2026 – Present Day (Signature Sound)
        Vibe: cinematic pop/country hybrid.
        Story beat: They return home changed, wiser, ready to choose their own path.

    Notes:
      - No lyrics yet; only conceptual structure.
      - Each track will require era‑accurate vocal styling + production.
      - This project is designed for maximum musical variety and narrative cohesion.

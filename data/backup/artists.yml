- id: art-ascension_youth_choir
  slug: ascension_youth_choir
  name:
    full: Ascension Youth Choir
    first: ""
    last: ""
    initials: ayc
  status: active
  type: group
  tagline: "Voices rising with purpose, unity, and heart"
  bio_short: "A vibrant youth ensemble blending warm harmonies, expressive performances, and uplifting energy."
  bio_long: >
    Ascension Youth Choir is a vibrant ensemble of young singers ages eight to fifteen, united by a shared love of music and a spirit of encouragement. 
    Because of this age range, the choir is always evolving — wonderful singers grow up and move on, and new voices step in to carry the sound forward. 
    Together, they keep the spirit of Ascension Youth Choir alive from season to season.

    Known for their warm harmonies, expressive performances, and genuine connection with one another, the choir brings an uplifting energy to every stage they step onto. 
    Whether they are rehearsing in a sunlit room, laughing between takes, or delivering a heartfelt performance, the members of Ascension Youth Choir embody the joy and authenticity of youth. 
    Their sound blends innocence with emerging confidence, creating a unique musical identity that feels both grounded and full of possibility.

    As part of the Horizon Sound family, the choir represents growth, community, and the belief that every young voice has something meaningful to offer. 
    Their performances celebrate unity, diversity, and the simple power of singing together.

    Contact Ascension Youth Choir at AYC@HorizonSound.org
  genres:
    primary: Pop
    secondary: Youth Ensemble
    tertiary: null
  images:
    hero: "../assets/artists/ascension-youth-choir/banners/AYC6.jpg"
    profile: "../assets/artists/ascension-youth-choir/profile/AYC6.jpg"
    banner: null

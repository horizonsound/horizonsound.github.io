      - src: "../assets/artists/ascension-youth-choir/gallery/AYC1.jpg"
        span: 1
      - src: "../assets/artists/ascension-youth-choir/gallery/AYC14.jpg"
        span: 2
  vocal_identity:
    base: >
      Warm expressive youth ensemble with blended harmonies, clear tone, and a grounded, mature presence. 
      Voices span early‑teen to mid‑teen range but maintain a unified, polished choral sound with smooth phrasing and gentle emotional lift. 
      Delivery is sincere, heartfelt, and uplifting — never childish, never overly bright, never pop‑cutesy. 
      The choir’s tone is warm, balanced, and full, with clean articulation, natural blend, and a supportive harmonic foundation. 
      Emotional center stays hopeful, encouraging, and authentic.
    model: "5.5"
    styles:
      emotional_ballad: >
        Soft, blended harmonies with gentle breath support, smooth legato phrasing, and a warm intimate tone. 
        Slightly slower delivery with expressive dynamics and a tender emotional presence. 
        Ideal for reflective, heartfelt, or inspirational songs. 
        Never overly dramatic, never theatrical, always sincere and grounded.
      uplifting_pop_choral: >
        Bright, energetic ensemble delivery with clean articulation, rhythmic unity, and a lightly modern pop influence. 
        Harmonies stay warm and blended, with a confident, uplifting emotional tone. 
        Ideal for mid‑tempo inspirational pop or feel‑good anthems. 
        Never sharp, never overly bright, never teen‑pop.
      cinematic_choral: >
        Fuller resonance, expanded dynamic range, and a more dramatic, atmospheric presence. 
        Smooth sustained harmonies, controlled vibrato (light and age‑appropriate), and expressive phrasing. 
        Ideal for soundtrack‑style or large emotional moments. 
        Never operatic, never adult‑dramatic — always youthful but mature.
      acoustic_soft: >
        Close, intimate ensemble tone with soft dynamics, gentle phrasing, and warm, blended harmonies. 
        Works well with acoustic guitar, piano, or minimal arrangements. 
        Emotional tone stays calm, sincere, and comforting. 
        Never breathy‑whispery, never childlike.
  colors:
    primary: "#2A4C8F"      # deep uplifting blue (AYC signature)
    secondary: "#E8EAF3"    # soft airy gray‑blue (light, youthful, clean)
    accent: "#F4B400"       # warm golden yellow (primary‑color pop, hopeful energy)

        Locked a drunk inside the stable
        ’til he sobered up at dawn,
        and when the sun came creepin’ in,
        my borrowed badge was gone.
    - type: Chorus
      order: 4
      debug_order_marker: ORDER=4
      text: |-
        I was sheriff for a night,
        wearin’ that silver star.
        Didn’t know the rules or nothin’,

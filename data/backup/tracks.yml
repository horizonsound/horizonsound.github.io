        You found your sun in the life you’re living,
        I chased mine across the sea.
        But Venice…
        Venice was always meant for two —
        and I can’t make that trip alone.
    - type: Chorus
      order: 9
      debug_order_marker: ORDER=9
      text: |-
        There’s one empty page in the book of my travels.
        A missing stamp that belongs to you and me.
        One promise we made all those years ago.
        Venice is waiting, but I won’t go without you.
        Some dreams don’t mean a thing if we’re not together.
        A tear rolls down as I see—
        my missing stamp…
    - type: Outro
      order: 10
      debug_order_marker: ORDER=10
      text: |-
        One blank page, one old promise,
        a place I won’t go alone.
        Someday still whispers softly,
        but Venice isn’t mine to own.
        So I tuck my passport gently in the drawer.

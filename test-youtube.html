<!DOCTYPE html>
<html>
<body>

<h1>YouTube Autoplay Test — 6 Songs</h1>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
  const videos = [
    "906ItpYuLuQ", // Forever in a Moment
    "BrZ1VWJ2lso", // Borrowed Time
    "-Yxig5Mq9u4", // The Quiet After
    "Xxj5U8xJ9ow", // placeholder
    "aBCdEFGhijk", // placeholder
    "LmNOpQRstuv"  // placeholder
  ];

  let index = 0;
  let player;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: videos[index],
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 1,
        rel: 0
      },
      events: {
        'onStateChange': onStateChange
      }
    });
  }

  function onStateChange(event) {
    console.log("STATE:", event.data, "VIDEO:", videos[index]);

    if (event.data === YT.PlayerState.ENDED) {
      index++;
      if (index < videos.length) {
        console.log("ADVANCING TO:", videos[index]);
        player.loadVideoById(videos[index]);
      } else {
        console.log("ALL VIDEOS COMPLETE.");
      }
    }
  }
</script>

</body>
</html>

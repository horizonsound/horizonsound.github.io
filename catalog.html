---
layout: default
title: Music – Horizon Sound
---

{% assign all_songs = site.data.youtube_feed.songs %}
{% include hero.html %}
<div class="music-page">
  <div class="catalog-panel">
    <div class="catalog-header">
        <div class="catalog-toggle">
          <button class="mode-toggle-button active" data-mode="playlists">Playlist View</button>
          <button class="mode-toggle-button" data-mode="catalog">Catalog Explorer</button>
        </div>
       <h2 class="page-title">Catalog Explorer</h2>
    </div>
    <div class="catalog-content">
      <!-- ============================================================
           PLAYLIST VIEW (NEW DEFAULT MODE)
           Premium 3:1 playlist tiles
      ============================================================ -->
      <section id="music-view-playlists">  
      </section>
      
      <section id="music-view-catalog" style="display:none;">
        <div class="view-toggle">
          <div class="view-toggle-buttons">
            <button class="view-toggle-button active" data-view="grouped">Grouped by Playlist</button>
            <button class="view-toggle-button" data-view="all">All Songs</button>
            <button class="view-toggle-button" data-view="carousel">Carousel View</button>
          </div>
        </div>
        <!-- ============================================================
             GROUPED VIEW
        ============================================================ -->
        <section id="music-view-grouped">
        </section>
        
        <!-- ============================================================
             ALL SONGS VIEW
        ============================================================ -->
        <section id="music-view-all" style="display:none;">
        </section>
        
        <!-- ============================================================
             CAROUSEL VIEW
        ============================================================ -->
        <section id="music-view-carousel" style="display:none;">
        </section>
      
      </section>
    </div>
  </div>
</div>
</div>

<a 
  class="playlist-premium-tile" 
  href="{{ site.baseurl }}/experience/{{ album.slug }}.html?song_id={{ album.first_track }}"
>
  <div class="playlist-premium-image-wrapper">
    <img 
      src="{{ site.baseurl }}{{ album.artwork }}" 
      alt="{{ album.title }}" 
      class="playlist-premium-image"
    >
    <div class="playlist-premium-gradient"></div>
    <div class="playlist-premium-title">{{ album.title }}</div>
  </div>
</a>

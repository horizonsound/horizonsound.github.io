<a 
  class="playlist-premium-tile" 
  href="{{ site.baseurl }}/music/playlists/{{ pl.playlist_id }}/?song_id={{ first_track }}"
>
  <div class="playlist-premium-image-wrapper">
    <img 
      src="{{ site.baseurl }}{{ artwork }}" 
      alt="{{ title }}" 
      class="playlist-premium-image"
    >
    <div class="playlist-premium-gradient"></div>
    <div class="playlist-premium-title">{{ title }}</div>
  </div>
</a>

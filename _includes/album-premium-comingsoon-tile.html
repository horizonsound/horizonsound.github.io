<div class="playlist-premium-tile coming-soon">
  <div class="playlist-premium-image-wrapper">
    <img src="{{ site.baseurl }}{{ artwork }}" class="playlist-premium-image">

    <div class="playlist-premium-overlay">
      Coming {{ earliest_ts | date: "%b %-d" }}
    </div>

    <div class="playlist-premium-gradient"></div>
    <div class="playlist-premium-title">{{ title }}</div>
  </div>
</div>

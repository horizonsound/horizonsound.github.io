    bio:
      - Cody Sails is a warm‑hearted coastal storyteller with a sun‑soaked voice and a barefoot, easygoing spirit.
      - His music blends beach‑folk, mellow pop, and golden‑hour acoustic grooves — always relaxed and inviting.
      - He sings about tides, friends, freedom, and the simple moments that make life feel lighter.
      - Within Horizon Sound, Cody anchors the Coastal Acoustic lane — warm, approachable, and emotionally grounded.

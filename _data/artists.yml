    headshot: /images/artists/lydia/headshot.jpg
    bio:
      - Lydia Ellington is a cinematic pop vocalist with a glowing emotional core and a voice that feels like light breaking through clouds.
      - Her music blends modern pop, orchestral textures, and heartfelt storytelling, creating songs that feel both intimate and widescreen.
      - Lydia writes about growth, resilience, love, and the quiet strength found in vulnerability.
      - Within Horizon Sound, Lydia defines the Cinematic Pop lane — glowing, emotional, and deeply expressive.

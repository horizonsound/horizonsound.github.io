  - playlist_id: a-way-back-trilogy
    is_collection: true
    title: "A Way Back Trilogy"
    subtitle: "A breakup told from differnt perspectives"
    description: >
      A three-part emotional arc exploring silence, self-worth, and the courage
      to choose yourself — or choose your way back home. Told from two
      perspectives, this trilogy follows the quiet unraveling of a relationship,
      the rediscovery of identity, and the moment two people decide whether to
      walk away or walk toward each other again.
    thumbnail:  /assets/playlist thumbnails/playlist - a-way-back - trilogy.jpeg
    hero: /assets/thumbnails/playlist-hero-a-way-back.jpeg
    songs:
      - lost-in-silence-from-a-way-back-horizon-sound
      - choosing-me-her-version-acoustic-pop-horizon-sound
      - choosing-me-his-version-pop-horizon-sound
    order: 1
  

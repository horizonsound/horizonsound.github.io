  - playlist_id: midnight-saga
    is_collection: true
    title: "Midnight Saga"
    subtitle: "Ravyn"
    description: >
      A cinematic late-night journey through identity, chaos, temptation, and
      transformation. The Midnight Saga follows a character through escalating
      emotional turbulence — from the moment before midnight, into mayhem and
      madness, and finally into the clarity that comes after the storm breaks.
    thumbnail:  /assets/playlist thumbnails/playlist - midnight saga.jpeg
    hero:  /assets/thumbnails/playlist-hero-midnight-saga.jpeg
    songs:
      - before-midnight-the-midnight-saga-chapter-1-horizon-sound
      - midnight-mayhem-the-midnight-saga-chapter-2-horizon-sound
      - midnight-madness-the-midnight-saga-chapter-3-horizon-sound
      - after-midnight-the-midnight-saga-chapter-4-horizon-sound
    order: 2
  
  - playlist_id: after-the-silence-performed-by-lydia-ellington
    is_collection: true
    title: "After the Silence"
    subtitle: "Lydia Ellington"
    description: >
      Inspired by the emotional depth and cinematic storytelling found in modern pop‑soul artists like Adele, After the Silence explores the quiet moments after heartbreak — the clarity, the reckoning, and the slow return of hope.  

      This collection blends warm piano, intimate vocals, and atmospheric pop production to create a reflective, deeply human journey through loss, healing, and rediscovery.
      
      Crafted as an intentionally emotional body of work, the album leans into themes of resilience, vulnerability, and the strength that emerges when the noise finally fades.
      
      It’s not an imitation — it’s a response to the same emotional landscapes that shape contemporary pop‑soul.
    thumbnail:  /assets/playlist thumbnails/playlist - after the silence – lydia ellington.jpeg
    hero: /assets/thumbnails/playlist-hero-after-the-silence.jpeg
    songs:
      - 1-the-quiet-after-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 2-borrowed-time-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 3-homesick-for-you-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 4-the-way-we-lied-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 5-paper-walls-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 6-half-of-me-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 7-if-you-d-asked-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 8-ghostlight-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 9-after-the-silence-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 10-saltwater-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 11-the-dress-i-never-wore-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 12-unsent-letters-performed-by-lydia-ellington-after-the-silence-horizon-sound
      - 13-rise-again-performed-by-lydia-ellington-after-the-silence-horizon-sound

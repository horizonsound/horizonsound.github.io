name: Update YouTube Metadata

on:
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./youtube-sync

      - name: Run metadata update
        run: node update-youtube.js
        working-directory: ./youtube-sync

      # IMPORTANT: Git commands must run from repo root
      - name: Commit changes
        run: |
          git config user.name "Horizon Bot"
          git config user.email "bot@horizonsound.com"
          git add _data/youtube_feed.yml
          git commit -m "Update YouTube metadata" || echo "No changes to commit"

      - name: Push changes
        run: git push

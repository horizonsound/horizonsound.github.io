name: Update YouTube Metadata

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run in dev or prod mode"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      MODE: ${{ github.event.inputs.mode }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./youtube-sync

      - name: Run metadata update
        run: node update-youtube.js
        working-directory: ./youtube-sync

      - name: Commit dev changes
        if: ${{ github.event.inputs.mode == 'dev' }}
        run: |
          git checkout -B metadata-dev
          git config user.name "Horizon Bot"
          git config user.email "bot@horizonsound.com"
          git add _data/youtube_feed_dev.yml
          git commit -m "Dev metadata test" || echo "No changes"
          git push origin metadata-dev --force

      - name: Commit prod changes
        if: ${{ github.event.inputs.mode == 'prod' }}
        run: |
          git config user.name "Horizon Bot"
          git config user.email "bot@horizonsound.com"
          git add _data/youtube_feed.yml
          git commit -m "Update YouTube metadata" || echo "No changes"
          git push
